version: '3.8'

services:
  api:
    build: .
    container_name: lft-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_PORT=3000
      - DATABASE_PATH=/app/data/uploads.db
      - STORAGE_ENDPOINT=minio
      - STORAGE_PORT=9000
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-minioadmin}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-minioadmin}
      - STORAGE_BUCKET_NAME=${STORAGE_BUCKET_NAME:-uploads}
      - STORAGE_USE_SSL=false
      - UPLOAD_CHUNK_SIZE_BYTES=${UPLOAD_CHUNK_SIZE_BYTES:-5242880}
      - CLEANUP_STALE_AFTER_MINUTES=${CLEANUP_STALE_AFTER_MINUTES:-1440}
      - CLEANUP_INTERVAL_SECONDS=${CLEANUP_INTERVAL_SECONDS:-3600}
      - CLEANUP_ENABLED=${CLEANUP_ENABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lft-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: lft-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${STORAGE_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${STORAGE_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:9000/minio/health/live"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lft-network
    restart: unless-stopped

volumes:
  minio_data:
    driver: local

networks:
  lft-network:
    driver: bridge
